<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Live Search | Fixi Playground</title>
		<style>
			* {
				box-sizing: border-box;
			}
			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				max-width: 800px;
				margin: 0 auto;
				padding: 1rem 2rem 4rem;
				line-height: 1.6;
			}
			.back-link {
				color: #0066cc;
				text-decoration: none;
				display: inline-block;
				position: sticky;
				top: 1rem;
				background: rgba(255, 255, 255, 0.95);
				padding: 0.5rem 1rem;
				border-radius: 6px;
				backdrop-filter: blur(8px);
				z-index: 10;
			}
			.back-link:hover {
				text-decoration: underline;
			}
			h1 {
				color: #333;
				border-bottom: 2px solid #0066cc;
				padding-bottom: 0.5rem;
				margin-top: 1rem;
			}
			.demo-info {
				background: #f0f7ff;
				padding: 1rem;
				border-radius: 8px;
				margin: 1rem 0;
				border-left: 4px solid #0066cc;
			}
			.demo-info p {
				margin: 0 0 0.5rem 0;
			}
			.demo-info p:last-child {
				margin-bottom: 0;
			}
			code {
				background: #e8e8e8;
				padding: 0.2rem 0.4rem;
				border-radius: 3px;
				font-size: 0.9em;
			}

			/* Search container - full width */
			.search-container {
				margin: 2rem 0;
			}

			/* Search input */
			.search-input-wrapper {
				position: relative;
				margin-bottom: 1.5rem;
			}

			.search-icon {
				position: absolute;
				left: 1rem;
				top: 50%;
				transform: translateY(-50%);
				color: #999;
				font-size: 1.2rem;
				pointer-events: none;
			}

			.search-input {
				width: 100%;
				padding: 1rem 1rem 1rem 3rem;
				font-size: 1rem;
				border: 2px solid #e0e0e0;
				border-radius: 12px;
				outline: none;
				transition: all 0.2s;
				background: white;
			}

			.search-input:focus {
				border-color: #0066cc;
				box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
			}

			.search-input.fx-requesting {
				background: #f8f9fa;
			}

			/* Loading spinner */
			.search-spinner {
				position: absolute;
				right: 1rem;
				top: 50%;
				transform: translateY(-50%);
				width: 20px;
				height: 20px;
				border: 2px solid #e0e0e0;
				border-top-color: #0066cc;
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
				display: none;
			}

			.search-input.fx-requesting ~ .search-spinner {
				display: block;
			}

			@keyframes spin {
				from {
					transform: translateY(-50%) rotate(0deg);
				}
				to {
					transform: translateY(-50%) rotate(360deg);
				}
			}

			/* Skeleton loading */
			.skeleton {
				display: flex;
				padding: 1rem;
				margin-bottom: 0.75rem;
				background: white;
				border-radius: 8px;
				border: 1px solid #e0e0e0;
			}
			.skeleton-icon {
				width: 40px;
				height: 40px;
				border-radius: 8px;
				background: #f0f0f0;
				margin-right: 1rem;
				animation: pulse 1.5s infinite;
			}
			.skeleton-text {
				flex: 1;
			}
			.skeleton-line {
				height: 1rem;
				background: #f0f0f0;
				border-radius: 4px;
				margin-bottom: 0.5rem;
				animation: pulse 1.5s infinite;
			}
			.skeleton-line:last-child {
				width: 80%;
			}
			@keyframes pulse {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.5;
				}
			}

			/* Results area */
			.search-results {
				min-height: 100px;
			}

			/* Initial state */
			.search-initial {
				text-align: center;
				padding: 3rem 2rem;
				color: #999;
			}

			.search-initial-icon {
				font-size: 3rem;
				margin-bottom: 1rem;
			}

			::view-transition-group(none) {
				animation: none;
			}
		</style>
		<script type="module">
			import "../../dist/core/index.js";
		</script>
	</head>
	<body>
		<header style="view-transition-name: disabled">
			<a
				href="../"
				class="back-link"
				>← Back to Playground</a
			>
			<h1>🔍 Live Search</h1>
			<div class="demo-info">
				<p>
					Type to search through items instantly. Uses <code>fx-debounce="300ms"</code>
					to wait 300ms after you stop typing before making the request.
				</p>
				<p>
					Matches are highlighted with <b>bold text</b>. No minimum character limit - search starts
					immediately.
				</p>
			</div>

			<div class="search-container">
				<div class="search-input-wrapper">
					<span class="search-icon">🔍</span>
					<input
						type="text"
						class="search-input"
						placeholder="Search projects, components, integrations..."
						fx-action="/api/search"
						fx-target="#search-results"
						fx-swap="innerHTML"
						fx-trigger="input"
						fx-debounce="80ms"
						fx-indicator
						name="q"
						autocomplete="off"
					/>
					<div class="search-spinner"></div>
				</div>
			</div>
		</header>

		<div
			id="search-results"
			class="search-results"
			fx-action="/api/search"
			fx-target="this"
			fx-trigger="intersect"
			fx-swap="innerHTML"
		>
			<!-- Skeleton loading state -->
			<div class="skeleton">
				<div class="skeleton-icon"></div>
				<div class="skeleton-text">
					<div class="skeleton-line"></div>
					<div class="skeleton-line"></div>
				</div>
			</div>
			<div class="skeleton">
				<div class="skeleton-icon"></div>
				<div class="skeleton-text">
					<div class="skeleton-line"></div>
					<div class="skeleton-line"></div>
				</div>
			</div>
			<div class="skeleton">
				<div class="skeleton-icon"></div>
				<div class="skeleton-text">
					<div class="skeleton-line"></div>
					<div class="skeleton-line"></div>
				</div>
			</div>
		</div>
	</body>
</html>
